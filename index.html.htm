    {q: "أول إمبراطور روماني ومؤسس النظام الإمبراطوري وحقق الاستقرار:", ans: 3, opts: ["(أ) تراجان", "(ب) حمورابي", "(ج) مرقس", "(د) أوكتافيوس (أغسطس)"], type: 5, corr: "(د) أوكتافيوس (أغسطس)"},
    {q: "إمبراطور روماني أعاد حفر قناة تربط بين النيل والبحر الأحمر:", ans: 2, opts: ["(أ) قسطنطين", "(ب) دقلديانوس", "(ج) تراجان", "(د) بطليموس"], type: 5, corr: "(ج) تراجان"},
    {q: "القديس الذي نشأت الرهبنة في مصر على يديه واتجه للصحراء:", ans: 0, opts: ["(أ) أنطونيوس", "(ب) مرقس", "(ج) باخوم", "(د) شنودة"], type: 5, corr: "(أ) أنطونيوس"},
    {q: "القديس الذي أدخل المسيحية إلى مصر وأنشأ أول كنيسة بالإسكندرية:", ans: 2, opts: ["(أ) أنطونيوس", "(ب) دقلديانوس", "(ج) مرقس", "(د) أوكتافيوس"], type: 5, corr: "(ج) مرقس"}
];

document.getElementById('startBtn').onclick = () => {
    userName = document.getElementById('uName').value;
    if(userName.length < 3) return alert("أدخل الاسم الثلاثي");
    startTime = new Date();
    document.getElementById('sWelcome').play();
    document.getElementById('scr-1').classList.remove('active-screen');
    document.getElementById('scr-2').classList.add('active-screen');
    document.getElementById('stagesNav').style.display = 'flex';
    loadQ();
};

function loadQ() {
    const q = quiz[cur];
    document.getElementById('qText').innerText = q.q;
    document.getElementById('feedback').style.display = 'none';
    document.getElementById('q-count').innerText = "السؤال: " + (cur+1);
    document.querySelectorAll('.stage-item').forEach((el, i) => {
        el.className = 'stage-item ' + (i === q.type ? 'current' : i < q.type ? 'done' : '');
    });
    const optsDiv = document.getElementById('options');
    optsDiv.innerHTML = "";
    let buttons = [];
    q.opts.forEach((o, i) => {
        const b = document.createElement('button');
        b.className = 'btn-opt'; b.innerText = o;
        b.onclick = () => check(i, b, buttons);
        optsDiv.appendChild(b);
        buttons.push(b);
    });
}

function check(i, b, btns) {
    if(!canAnswer) return;
    canAnswer = false;
    const feedback = document.getElementById('feedback');
    if(i === quiz[cur].ans) {
        score++; b.classList.add('correct');
        document.getElementById('sCor').play();
        setTimeout(() => document.getElementById('vCor').play(), 300);
    } else {
        b.classList.add('wrong');
        btns[quiz[cur].ans].classList.add('correct');
        document.getElementById('sErr').play();
        feedback.innerText = quiz[cur].corr;
        feedback.style.display = 'block';
        setTimeout(() => document.getElementById('vErr').play(), 300);
    }
    document.getElementById('s-val').innerText = "الدرجة: " + score;
}

function nextQ() {
    cur++;
    canAnswer = true;
    if(cur < quiz.length) loadQ();
    else sendResult();
}

function sendResult() {
    const duration = Math.round((new Date() - startTime) / 1000);
    const params = new URLSearchParams({name: userName, lesson: "الحضارة الرومانية", score: score, duration: duration});
    fetch(GAS_URL, { method: 'POST', mode: 'no-cors', body: params })
    .then(() => { 
        document.getElementById('scr-2').classList.remove('active-screen');
        document.getElementById('scr-3').classList.add('active-screen');
        document.getElementById('stagesNav').style.display = 'none';
        
        let message = "";
        const percentage = (score / quiz.length) * 100;
        if (percentage >= 85) message = "أهلاً " + userName + "، إمبراطور حقيقي! 👑 حصلت على " + score + " من 50. تفوقك يذكرنا بعظمة روما، تم إرسال نتيجتك بنجاح.";
        else if (percentage >= 50) message = "أهلاً " + userName + "، محارب قدير! 🛡️ حصلت على " + score + " من 50. بداية موفقة، حاول مجدداً لتصبح قائداً، تم إرسال نتيجتك بنجاح.";
        else message = "أهلاً " + userName + "، تحتاج لتدريب أكثر يا بطل! ⚔️ حصلت على " + score + " من 50. راجع الدرس لتتحسن، تم إرسال نتيجتك بنجاح.";
        document.getElementById('final-msg').innerText = message;
    });
}

document.getElementById('vCor').onended = nextQ;
document.getElementById('vErr').onended = nextQ;
</script>
